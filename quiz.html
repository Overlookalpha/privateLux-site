<!DOCTYPE html>
<html>
<head>
<title>Questionário - PrivateLux</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.container{
max-width:600px;
margin:auto;
padding:40px;
}

h1{
color:#C9A24A;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:none;
border-radius:5px;
}

button{
background:#C9A24A;
cursor:pointer;
font-size:16px;
}

</style>
</head>

<body class="semMenu">
  
<div class="container">

<h1>Antes de continuar</h1>

<label>Em qual cidade você está?</label><br><br>

<input list="cidades" id="cidade" placeholder="Digite sua cidade"><br><br>

<div id="cidadeDetectada" style="display:none; margin-bottom:15px;">

Detectamos que você está em 
<strong id="cidadeNome"></strong>

<br><br>

<button type="button" onclick="confirmarCidade()">Confirmar cidade</button>

</div>

<datalist id="cidades">

<option value="Lisboa">
<option value="Amadora">
<option value="Oeiras">
<option value="Cascais">
<option value="Sintra">
<option value="Loures">

<option value="Setúbal">
<option value="Almada">
<option value="Montijo">
<option value="Moita">
<option value="Barreiro">
<option value="Palmela">

<option value="Porto">
<option value="Braga">
<option value="Coimbra">
<option value="Faro">

</datalist>

<label>Tipo de atendimento</label>
<select id="tipo">
<option>Atendimento local</option>
<option>Deslocamento até mim</option>
</select>

<label>Quando deseja o atendimento?</label>
<select id="tempo">
<option>Agora</option>
<option>Hoje mais tarde</option>
<option>Agendar outro dia</option>
</select>

<button onclick="continuar()">Continuar</button>

</div>

<script>

function continuar(){

let cidade = document.getElementById("cidade").value;
let tipo = document.getElementById("tipo").value;
let tempo = document.getElementById("tempo").value;

localStorage.setItem("cidadeCliente",cidade);
localStorage.setItem("tipoAtendimento",tipo);
localStorage.setItem("tempoAtendimento",tempo);

window.location.href="perfil.html";

}

</script>
<script>

let cidadeAuto = "";

// DETECTAR CIDADE PELO IP
fetch("https://ipapi.co/json/")
.then(response => response.json())
.then(data => {

cidadeAuto = data.city || "";

// CORRIGIR NOMES
if(cidadeAuto === "Lisbon"){
cidadeAuto = "Lisboa";
}

// MOSTRAR SEMPRE SE TIVER VALOR
if(cidadeAuto !== ""){

document.getElementById("cidadeNome").innerText = cidadeAuto;

document.getElementById("cidadeDetectada").style.display = "block";

}

})
.catch(error => {

console.log("Erro ao detectar cidade");

// TESTE FORÇADO (pra não sumir nunca)
cidadeAuto = "Lisboa";

document.getElementById("cidadeNome").innerText = cidadeAuto;

document.getElementById("cidadeDetectada").style.display = "block";

});
// FUNÇÃO DO BOTÃO "CONFIRMAR CIDADE"
function confirmarCidade(){

document.getElementById("cidade").value = cidadeAuto;

}

</script>
</body>
</html>
