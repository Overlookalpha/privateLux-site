<!DOCTYPE html>
<html>
<head>
<title>Perfil - PrivateLux</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* MENU */

.menu{
display:flex;
justify-content:space-between;
padding:20px;
background:#121212;
}

.logo{
color:#C9A24A;
font-size:24px;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:40px;
}

/* FOTO PRINCIPAL */

.foto-principal img{
width:100%;
height:450px;
object-fit:cover;
border-radius:10px;
}

/* GALERIA */

.galeria{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;
}

.galeria img{
width:100px;
height:100px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
}

/* INFO */

.nome{
font-size:36px;
color:#C9A24A;
margin-top:30px;
}

.cidade{
font-size:18px;
margin-bottom:20px;
color:#aaa;
}

/* BOTÃO */

.botao{
background:#C9A24A;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}
#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<div class="menu">
<div class="logo">PrivateLux</div>
</div>

<div class="container">

<!-- FOTO GRANDE -->

<div class="foto-principal">
<img id="fotoGrande" src="anna.jpg">
</div>

<!-- GALERIA -->

<div class="galeria">

<img src="anna.jpg" onclick="trocarFoto(this)">
<img src="fundo.webp" onclick="trocarFoto(this)">
<img src="ima.webp" onclick="trocarFoto(this)">
<img src="anna.jpg" onclick="trocarFoto(this)">
<img src="fundo.webp" onclick="trocarFoto(this)">
<img src="ima.webp" onclick="trocarFoto(this)">
<img src="anna.jpg" onclick="trocarFoto(this)">
<img src="fundo.webp" onclick="trocarFoto(this)">

</div>

<div id="lightbox" onclick="fecharFoto()">
<img id="fotoZoom">
</div>
  
<!-- INFORMAÇÕES -->

<div class="nome">Anna</div>

<div class="cidade">Lisboa</div>

<p>
Acompanhante exclusiva, elegante e discreta.
Disponível para encontros privados e jantares.
</p>

<button class="botao" onclick="irReserva('351931714823','Anna')">
Reservar
</button>

</div>
<script>

function trocarFoto(img){

document.getElementById("fotoGrande").src = img.src;

let lightbox = document.getElementById("lightbox");
let fotoZoom = document.getElementById("fotoZoom");

fotoZoom.src = img.src;
lightbox.style.display = "flex";

}
function fecharFoto(){

document.getElementById("lightbox").style.display = "none";

}
</script>
<script>

function irReserva(numero,nome){

localStorage.setItem("numeroAcompanhante",numero);
localStorage.setItem("nomeAcompanhante",nome);

window.location.href="reserva.html";

}

</script>

</body>
</html>
