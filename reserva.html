function calcularDistanciaKm(c1, c2){

if(!coordenadas[c1] || !coordenadas[c2]){
return null;
}

let lat1 = coordenadas[c1].lat;
let lon1 = coordenadas[c1].lng;
let lat2 = coordenadas[c2].lat;
let lon2 = coordenadas[c2].lng;

let R = 6371; // raio da terra

let dLat = (lat2 - lat1) * Math.PI / 180;
let dLon = (lon2 - lon1) * Math.PI / 180;

let a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1 * Math.PI / 180) *
Math.cos(lat2 * Math.PI / 180) *
Math.sin(dLon/2) * Math.sin(dLon/2);

let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

let distancia = R * c;

return distancia;

}

async function obterCoordenadas(cidade){

try{

let resposta = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${cidade},Portugal`);

let dados = await resposta.json();

if(dados.length > 0){
return {
lat: parseFloat(dados[0].lat),
lng: parseFloat(dados[0].lon)
};
}

return null;

}catch(e){
return null;
}

}
  
function calcularDeslocamento(cliente, acompanhante){

// mesma cidade
if(cliente === acompanhante){
return 10;
}

// calcular distância real
let distancia = calcularDistanciaKm(cliente, acompanhante);

if(distancia){

return Math.round(distancia * 0.5); // 0.5€ por km

}

// fallback
return 20;

}

 // se opção atual for inválida, troca automaticamente

}

"Não foi possível calcular a distância";

}

// função nova para coordenadas diretas
function calcularDistanciaKmCoord(c1, c2){

let R = 6371;

let dLat = (c2.lat - c1.lat) * Math.PI / 180;
let dLon = (c2.lng - c1.lng) * Math.PI / 180;

let a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(c1.lat * Math.PI / 180) *
Math.cos(c2.lat * Math.PI / 180) *
Math.sin(dLon/2) * Math.sin(dLon/2);

let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R * c;

}
