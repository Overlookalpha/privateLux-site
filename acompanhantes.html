<!DOCTYPE html>
<html>
<head>
<title>Acompanhantes - PrivateLux</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.menu{
display:flex;
justify-content:space-between;
padding:20px;
background:#121212;
}

.logo{
color:#C9A24A;
font-size:24px;
font-weight:bold;
}

.links a{
color:white;
margin-left:20px;
text-decoration:none;
}

.container{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
border-radius:8px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
margin:10px;
color:#C9A24A;
}

.card p{
margin:10px;
}

</style>

</head>

<body>

<div class="menu">

<div class="logo">
PrivateLux
</div>

<div class="links">
<a href="index.html">Home</a>
<a href="acompanhantes.html">Acompanhantes</a>
</div>

</div>

<div style="height:20px;"></div>

<div style="padding:20px; text-align:center;">

<select id="cidade" style="padding:10px; margin-right:10px;">
<option value="todas">Todas as cidades</option>
<option value="lisboa">Lisboa</option>
<option value="porto">Porto</option>
</select>

<button onclick="filtrar()" style="padding:10px 20px; background:#C9A24A; border:none;">
Pesquisar
</button>

</div>

<div class="container">

<a href="perfil.html" class="card">
<img src="anna.jpg">
<h3>Anna</h3>
<p>Lisboa</p>
</a>

</div>
<script>

function filtrar(){
let cidade = document.getElementById("cidade").value;

let cards = document.querySelectorAll(".card");

cards.forEach(card => {
let texto = card.innerText.toLowerCase();

if(cidade === "todas" || texto.includes(cidade)){
card.style.display = "block";
}else{
card.style.display = "none";
}
});

}

</script>
</body>
</html>
