
<!DOCTYPE html>
<html>
<head>
<title>Acompanhantes - PrivateLux</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.menu{
display:flex;
justify-content:space-between;
padding:20px;
background:#121212;
}

.logo{
color:#C9A24A;
font-size:24px;
font-weight:bold;
}

.links a{
color:white;
margin-left:20px;
text-decoration:none;
}

.container{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
border-radius:8px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
margin:10px;
color:#C9A24A;
}

.card p{
margin:10px;
}

.gridPerfis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.perfilMini{
text-align:center;
cursor:pointer;
}

.perfilMini img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.perfilMini span{
display:block;
margin-top:5px;
font-size:14px;
color:#fff;
}
@media (max-width: 768px){

  .gridPerfis{
    grid-template-columns: 1fr !important;
  }

}
</style>

</head>

<body>

<div class="menu">

<div class="logo">
PrivateLux
</div>

<div class="links">
<a href="index.html">Home</a>
<a href="acompanhantes.html">Acompanhantes</a>
</div>

</div>

<div style="height:20px;"></div>

<div style="padding:20px; text-align:center;">
<select id="categoria" style="padding:10px; margin-right:10px;">
<option value="todas">Todas</option>
<option value="mulheres">Mulheres</option>
<option value="homens">Homens</option>
</select>
<select id="cidade" style="padding:10px; margin-right:10px;">
<option value="todas">Todas as cidades</option>
<option value="lisboa">Lisboa</option>
<option value="porto">Porto</option>
</select>

<button onclick="filtrar()" style="padding:10px 20px; background:#C9A24A; border:none;">
Pesquisar
</button>

</div>

<div class="container">

<div class="card" onclick="abrirPerfil('anna')">
<img src="anna.jpg">
<h3>Anna</h3>
<p>Lisboa</p>
<p>Mulheres</p>
</div>
</div>

  <!-- PERFIS PEQUENOS -->
<div class="gridPerfis">

 <div class="perfilMini" onclick="abrirPerfil('maria')">
  <img src="maria.jpg">
  <span>Maria</span>
</div>
  
  <div class="perfilMini" onclick="abrirPerfil('julia')">
  <img src="julia.jpg">
  <span>Julia</span>
</div>

<div class="perfilMini" onclick="abrirPerfil('ana')">
  <img src="ana.jpg">
  <span>Ana</span>
</div>

</div>

<script>

function filtrar(){
let cidade = document.getElementById("cidade").value;
let categoria = document.getElementById("categoria").value;

let cards = document.querySelectorAll(".card");

cards.forEach(card => {
let texto = card.innerText.toLowerCase();

let matchCidade = cidade === "todas" || texto.includes(cidade);
let matchCategoria = categoria === "todas" || texto.includes(categoria);

if(matchCidade && matchCategoria){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

}
function abrirPerfil(nome){
  localStorage.setItem("perfilSelecionado", nome);
  window.location.href = "perfil.html";
}
</script>
</body>
</html>
