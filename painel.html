<!DOCTYPE html>
<html>
<head>
<title>Painel - PrivateLux</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.container{
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button{
  background:#C9A24A;
  border:none;
  padding:10px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}
  @media (max-width: 600px){

  h2{
    font-size: 22px;
    margin-bottom:10px;
  }

  input, textarea{
    font-size:16px;
    padding:12px !important;
  }

  textarea{
    min-height:100px;
  }

  button{
    font-size:16px;
    padding:14px;
    border-radius:8px;
  }

  .card{
    padding:15px;
  }

}
</style>

</head>

<body>

<div class="container">
<h2>Meu Perfil</h2>

<div class="card">

<input id="nome" placeholder="Seu nome" style="width:100%; padding:10px; margin-bottom:10px;">
<input id="cidade" placeholder="Cidade" style="width:100%; padding:10px; margin-bottom:10px;">

<textarea id="descricao" placeholder="Descrição" style="width:100%; padding:10px;"></textarea>
<input type="file" id="inputFoto">
<button onclick="()">Enviar Foto</button>

<button onclick="salvarPerfil()">
Salvar Perfil
</button>

</div>

<h2>Reservas</h2>

<div id="listaReservas"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  onSnapshot,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { 
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_npgtvRpaEvAdJSsZRTQ-dgDBGefEd0w",
  authDomain: "privatelux.firebaseapp.com",
  projectId: "privatelux",
  storageBucket: "privatelux.firebasestorage.app",
  messagingSenderId: "54727056404",
  appId: "1:54727056404:web:d475eab8632633f8c8db01"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
let usuarioAtual = null;

onAuthStateChanged(auth, (user) => {
  if(user){
    usuarioAtual = user;
  }
});

const lista = document.getElementById("listaReservas");

onSnapshot(collection(db, "reservas"), (snapshot) => {

  lista.innerHTML = "";

  snapshot.forEach(doc => {

    let r = doc.data();

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${r.nome}</b><br>
      📍 ${r.endereco}<br>
      ⏰ ${r.horario}<br>
      ${r.servico}<br>
      ${r.total}<br>

      <button onclick="iniciar('${doc.id}')">
        🚗 Iniciar deslocamento
      </button>
    `;

    lista.appendChild(div);

  });

});
window.salvarPerfil = async function(){

 const user = usuarioAtual;

  if(!user){
    alert("Você não está logado");
    return;
  }

  const nome = document.getElementById("nome").value;
  const cidade = document.getElementById("cidade").value;
  const descricao = document.getElementById("descricao").value;

  try{

    await setDoc(doc(db, "acompanhantes", user.uid), {
      nome: nome,
      cidade: cidade,
      descricao: descricao
    }, { merge: true });

    alert("Perfil salvo com sucesso!");

  }catch(e){
    alert("Erro: " + e.message);
  }

}
  </script>
<script>
  async function enviarFoto() {
  const file = document.getElementById("inputFoto").files[0];

  if (!file) {
    alert("Escolhe uma imagem primeiro");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "unsigned_upload");

  const res = await fetch("https://api.cloudinary.com/v1_1/ds7ilbhb1/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  console.log("URL:", data.secure_url);

  const user = usuarioAtual;

if(user){
  await setDoc(doc(db, "acompanhantes", user.uid), {
    foto: data.secure_url
  }, { merge: true });
}

alert("Imagem enviada e salva!");
}
  </script>
</body>
</html>
